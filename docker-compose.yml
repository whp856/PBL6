version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DEBUG=1
      - DATABASE_URL=mysql://root:password@db:3306/pbl6
    volumes:
      - .:/app

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=pbl6
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: